title: Senior Forge Codex
tagline: The definitive reference for the path to Android Seniority.
description: >-
  The Senior Forge Codex: The Path to Seniority. A technical reference manual for Senior Android Developer interviews.

url: "https://aghmnl.github.io"
baseurl: "/senior-forge-codex"

author: aghmnl
github_username: aghmnl

theme: jekyll-theme-chirpy

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: "en"
    values:
      lang: en
  - scope:
      path: "es"
    values:
      lang: es

# Chirpy Specific Configuration
# (Add more as needed, but this is a base start)
timezone: UTC
lang: en # default language

# Markdown engine
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM # GitHub Flavored Markdown
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true # Si querés números de línea
