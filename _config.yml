title: The Senior Forge Codex
description: >-
  A compendium of theoretical topics serving as a reference for The Senior Forge articles on the journey to seniority.
  This theory also serves as a comprehensive resource for technical interviews for Senior Android Developer positions.
author: aghmnl
owner_name: aghmnl
github_username: aghmnl
remote_theme: pages-themes/midnight
baseurl: ""
url: ""

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: "en"
    values:
      lang: en
      layout: default
  - scope:
      path: "es"
    values:
      lang: es
      layout: default

# Exclusion list
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache
  - .sass-cache
  - .jekyll-metadata

sass:
  style: compressed
  quiet_deps: true
